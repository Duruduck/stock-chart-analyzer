  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:#030b12;color:#cfe8f0;font-family:'Noto Sans KR',sans-serif;max-width:480px;margin:0 auto;min-height:100vh}
  input{outline:none;font-family:inherit}
  button{font-family:inherit;cursor:pointer;border:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .spinner{width:38px;height:38px;border-radius:50%;border:3px solid #0d2535;border-top:3px solid #00e5ff;animation:spin .7s linear infinite;margin:0 auto 14px}
  .dot{width:6px;height:6px;border-radius:50%;background:#00e5ff;box-shadow:0 0 7px #00e5ff;animation:pulse 2s infinite;display:inline-block}
  .tab-btn{flex:1;padding:10px 2px;border:none;background:transparent;font-size:10px;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
  .tab-btn.active{color:#00e5ff;border-bottom-color:#00e5ff;font-weight:700}
  .tab-btn:not(.active){color:#1e3a4a}
  .period-btn,.pred-btn,.ind-btn{border-radius:7px;font-size:10px;cursor:pointer;transition:all .15s;background:#060d14;border:1px solid #0d2535;color:#1e3a4a}

  .pred-btn.active{background:#ffd74018;border-color:#ffd740;color:#ffd740;font-weight:700}
  .ind-btn.active{font-weight:700}

  .popular-btn{padding:12px;border-radius:12px;border:1px solid #0d2535;background:#0a1a27;cursor:pointer;text-align:left;width:100%}
  .badge{font-size:9px;background:#0a1a27;padding:2px 6px;border-radius:4px;color:#1e3a4a}
  #error-box{margin:14px;padding:14px;background:#ff525218;border-radius:12px;border:1px solid #ff525244;display:none}
  #loading-box{padding:60px 20px;text-align:center;display:none}
  #home-box{padding:18px 14px}
  #stock-box{display:none}

<script>
const TMAP={'삼성전자':'005930.KS','sk하이닉스':'000660.KS','lg에너지솔루션':'373220.KS','lg에너지':'373220.KS','카카오':'035720.KS','네이버':'035420.KS','naver':'035420.KS','현대차':'005380.KS','현대자동차':'005380.KS','삼성sdi':'006400.KS','셀트리온':'068270.KS','posco홀딩스':'005490.KS','포스코홀딩스':'005490.KS','기아':'000270.KS','현대모비스':'012330.KS','kb금융':'105560.KS','신한지주':'055550.KS','하이브':'352820.KS','크래프톤':'259960.KS','에코프로비엠':'247540.KQ','에코프로':'086520.KQ','카카오뱅크':'323410.KS','lg화학':'051910.KS','삼성바이오로직스':'207940.KS','삼성바이오':'207940.KS','apple':'AAPL','아마존':'AMZN','amazon':'AMZN','tesla':'TSLA','테슬라':'TSLA','nvidia':'NVDA','엔비디아':'NVDA','microsoft':'MSFT','마이크로소프트':'MSFT','google':'GOOGL','구글':'GOOGL','meta':'META','메타':'META','애플':'AAPL'};
function resolveTicker(q){const k=q.trim().toLowerCase().replace(/\s+/g,'');if(TMAP[k])return TMAP[k];for(const[key,val]of Object.entries(TMAP)){if(k.includes(key)||key.includes(k))return val;}if(/^\d{6}$/.test(q.trim()))return q.trim()+'.KS';return q.trim().toUpperCase();}
function sma(d,p){return d.map((_,i)=>i<p-1?null:d.slice(i-p+1,i+1).reduce((s,v)=>s+v,0)/p);}
function ema(d,p){const k=2/(p+1),r=[d[0]];for(let i=1;i<d.length;i++)r.push(d[i]*k+r[i-1]*(1-k));return r;}
function rsi(d,p=14){const r=Array(p).fill(null);let ag=0,al=0;for(let i=1;i<=p;i++){const x=d[i]-d[i-1];x>0?ag+=x:al-=x;}ag/=p;al/=p;r.push(al===0?100:100-100/(1+ag/al));for(let i=p+1;i<d.length;i++){const x=d[i]-d[i-1];ag=(ag*(p-1)+Math.max(x,0))/p;al=(al*(p-1)+Math.max(-x,0))/p;r.push(al===0?100:100-100/(1+ag/al));}return r;}
function boll(d,p=20,m=2){return d.map((_,i)=>{if(i<p-1)return null;const sl=d.slice(i-p+1,i+1),mn=sl.reduce((s,v)=>s+v,0)/p;const sd=Math.sqrt(sl.reduce((s,v)=>s+(v-mn)**2,0)/p);return{u:mn+m*sd,mid:mn,lo:mn-m*sd};});}
function macd(d){const e12=ema(d,12),e26=ema(d,26),mc=e12.map((v,i)=>v-e26[i]),sig=ema(mc,9);return{mc,sig,hist:mc.map((v,i)=>v-sig[i])};}
function obv(c,v){const r=[0];for(let i=1;i<c.length;i++)r.push(r[i-1]+(c[i]>c[i-1]?v[i]:c[i]<c[i-1]?-v[i]:0));return r;}
function crosses(fast,slow){const out=[];for(let i=1;i<fast.length;i++){if(!fast[i]||!slow[i]||!fast[i-1]||!slow[i-1])continue;if(fast[i-1]<slow[i-1]&&fast[i]>=slow[i])out.push({i,type:'golden'});else if(fast[i-1]>slow[i-1]&&fast[i]<=slow[i])out.push({i,type:'dead'});}return out;}
function monteCarlo(prices,days=5,sims=1200){const rets=prices.slice(1).map((p,i)=>Math.log(p/prices[i]));const mu=rets.reduce((s,v)=>s+v,0)/rets.length;const sigma=Math.sqrt(rets.reduce((s,v)=>s+(v-mu)**2,0)/rets.length);const last=prices[prices.length-1],paths=[];for(let s=0;s<sims;s++){let p=last;const path=[p];for(let d=0;d<days;d++){const z=Array.from({length:6},()=>Math.random()).reduce((a,b)=>a+b)-3;p*=Math.exp((mu-.5*sigma*sigma)+sigma*z);path.push(p);}paths.push(path);}const fp=paths.map(p=>p[p.length-1]).sort((a,b)=>a-b);const ds=[];for(let d=1;d<=days;d++){const dp=paths.map(p=>p[d]).sort((a,b)=>a-b);ds.push({day:d,p10:dp[Math.floor(sims*.1)],p50:dp[Math.floor(sims*.5)],p90:dp[Math.floor(sims*.9)]});}return{p10:fp[Math.floor(sims*.1)],p50:fp[Math.floor(sims*.5)],p90:fp[Math.floor(sims*.9)],ds,sigma,mu};}
function lrForecast(prices,days=5){const n=Math.min(20,prices.length),rec=prices.slice(-n);const xm=(n-1)/2,ym=rec.reduce((s,v)=>s+v,0)/n;const sl=rec.reduce((s,v,i)=>s+(i-xm)*(v-ym),0)/rec.reduce((s,_,i)=>s+(i-xm)**2,0);const ic=ym-sl*xm;return Array.from({length:days},(_,i)=>ic+sl*(n+i));}
function score(closes,vols){const last=closes[closes.length-1];const s5=sma(closes,5).slice(-1)[0],s20=sma(closes,20).slice(-1)[0],s60=sma(closes,60).slice(-1)[0];const rv=rsi(closes).slice(-1)[0],bb=boll(closes).slice(-1)[0];const{mc,sig}=macd(closes);const ov=obv(closes,vols),obvUp=ov[closes.length-1]>ov[closes.length-6];let sc=0;const sigs=[];if(last>s5){sc+=8;sigs.push({n:'SMA5 상향',v:'+8',b:true});}else{sc-=8;sigs.push({n:'SMA5 하향',v:'-8',b:false});}if(last>s20){sc+=12;sigs.push({n:'SMA20 상향',v:'+12',b:true});}else{sc-=12;sigs.push({n:'SMA20 하향',v:'-12',b:false});}if(s20>s60){sc+=18;sigs.push({n:'골든크로스',v:'+18',b:true});}else{sc-=18;sigs.push({n:'데드크로스',v:'-18',b:false});}if(rv<30){sc+=22;sigs.push({n:'RSI 과매도',v:'+22',b:true});}else if(rv>70){sc-=12;sigs.push({n:'RSI 과매수',v:'-12',b:false});}else{sc+=5;sigs.push({n:'RSI 중립',v:'+5',b:true});}if(mc.slice(-1)[0]>sig.slice(-1)[0]){sc+=13;sigs.push({n:'MACD 매수',v:'+13',b:true});}else{sc-=13;sigs.push({n:'MACD 매도',v:'-13',b:false});}if(bb&&last<bb.lo){sc+=18;sigs.push({n:'볼밴 하단',v:'+18',b:true});}else if(bb&&last>bb.u){sc-=8;sigs.push({n:'볼밴 상단',v:'-8',b:false});}if(obvUp){sc+=10;sigs.push({n:'OBV 상승',v:'+10',b:true});}else{sc-=10;sigs.push({n:'OBV 하락',v:'-10',b:false});}return{score:Math.max(-100,Math.min(100,sc)),signals:sigs};}
let SD=null,MC=null,PERIOD=30,SIMDAYS=5;
let SHOW={candle:true,boll:true,sma5:true,sma20:false,sma60:false,cross:true};
let HISTORY=[];
function fmtP(v,isKr){if(v==null)return'-';if(isKr)return'₩'+Math.round(v).toLocaleString('ko-KR');return'$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtL(v){if(v>=1000000)return(v/1000000).toFixed(2)+'M';if(v>=10000)return(v/10000).toFixed(0)+'만';if(v>=1000)return(v/1000).toFixed(1)+'k';return v.toFixed(2);}
async function fetchData(ticker){const end=Math.floor(Date.now()/1000);const start=end-60*60*24*130;const yurl=`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&period1=${start}&period2=${end}`;const proxies=[`https://api.allorigins.win/get?url=${encodeURIComponent(yurl)}`,`https://corsproxy.io/?${encodeURIComponent(yurl)}`,`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(yurl)}`];let lastErr='';for(const proxy of proxies){try{const resp=await fetch(proxy,{signal:AbortSignal.timeout(8000)});if(!resp.ok)continue;const wrapper=await resp.json();const raw=wrapper.contents||wrapper;const data=typeof raw==='string'?JSON.parse(raw):raw;return parseYahoo(data,ticker);}catch(e){lastErr=e.message;continue;}}throw new Error('데이터를 가져올 수 없습니다.('+lastErr+')');}
function parseYahoo(data,ticker){const result=data?.chart?.result?.[0];if(!result)throw new Error('종목을 찾을 수 없습니다: '+ticker);const ts=result.timestamp,q=result.indicators.quote[0],meta=result.meta;const valid=ts.map((t,i)=>({t,o:q.open[i],h:q.high[i],l:q.low[i],c:q.close[i],v:q.volume[i]})).filter(d=>d.c!=null&&d.v!=null&&d.v>0);if(valid.length<15)throw new Error('데이터가 부족합니다('+valid.length+'일)');const recent=valid.slice(-100);const isKr=ticker.endsWith('.KS')||ticker.endsWith('.KQ');return{name:meta.longName||meta.shortName||ticker,ticker,isKr,market:isKr?(ticker.endsWith('.KQ')?'KOSDAQ':'KOSPI'):'해외',cur:meta.regularMarketPrice||recent[recent.length-1].c,prev:meta.previousClose||recent[recent.length-2].c,h52:meta.fiftyTwoWeekHigh,l52:meta.fiftyTwoWeekLow,closes:recent.map(d=>d.c),volumes:recent.map(d=>d.v),candles:recent.map(d=>({o:d.o||d.c,h:d.h||d.c,l:d.l||d.c,c:d.c})),len:recent.length};}
async function doSearch(){const q=document.getElementById('qinput').value.trim();if(!q)return;const ticker=resolveTicker(q);setLoading(true);try{SD=await fetchData(ticker);MC=monteCarlo(SD.closes,SIMDAYS);addHistory(q,SD.name);renderStock();}catch(e){showError(e.message);}setLoading(false);}
function quickSearch(name){document.getElementById('qinput').value=name;doSearch();}
function addHistory(q,name){HISTORY=[{q,name},...HISTORY.filter(h=>h.q!==q)].slice(0,5);const bar=document.getElementById('history-bar');bar.innerHTML=HISTORY.map(h=>`<button onclick="document.getElementById('qinput').value='${h.q}';doSearch()" style="padding:3px 8px;border-radius:20px;border:1px solid #0d2535;background:#060f1a;color:#456070;font-size:9.5px;cursor:pointer">🕐 ${h.name}</button>`).join('');}
function setLoading(on){document.getElementById('loading-box').style.display=on?'block':'none';document.getElementById('error-box').style.display='none';document.getElementById('home-box').style.display=on?'none':'';document.getElementById('stock-box').style.display='none';document.getElementById('search-btn').disabled=on;document.getElementById('search-btn').style.background=on?'#0d2535':'linear-gradient(135deg,#00b0ff,#00e5ff)';document.getElementById('search-btn').textContent=on?'로딩중':'🔍 검색';}
function showError(msg){document.getElementById('home-box').style.display='none';document.getElementById('error-box').style.display='block';document.getElementById('err-msg').textContent=msg;}
function totScY(v,mn,mx,h,pad=4){return h-pad-((v-mn)/(mx-mn||1))*(h-pad*2);}
function mkSVGPath(pts){const v=pts.filter(p=>p&&!isNaN(p[1]));if(!v.length)return'';return v.map((p,i)=>`${i===0?'M':'L'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');}
function buildGauge(sc){const c=Math.max(-100,Math.min(100,sc));const rad=((c/100*90-90)*Math.PI/180),cx=60,cy=52,r=40;const col=c>30?'#00e676':c>0?'#69f0ae':c>-30?'#ffd740':'#ff5252';const lbl=c>=50?'강한매수':c>=20?'매수':c>=-20?'중립':c>=-50?'매도':'강한매도';const nx=cx+r*Math.cos(rad),ny=cy+r*Math.sin(rad);return`<svg width="120" height="68" viewBox="0 0 120 68"><defs><linearGradient id="gg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#ff5252"/><stop offset="50%" stop-color="#ffd740"/><stop offset="100%" stop-color="#00e676"/></linearGradient></defs><path d="M${cx-r},${cy} A${r},${r} 0 0,1 ${cx+r},${cy}" fill="none" stroke="#1a2a35" stroke-width="8"/><path d="M${cx-r},${cy} A${r},${r} 0 0,1 ${cx+r},${cy}" fill="none" stroke="url(#gg)" stroke-width="5" stroke-linecap="round"/><line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="${col}" stroke-width="2.5" stroke-linecap="round"/><circle cx="${cx}" cy="${cy}" r="3.5" fill="${col}"/><text x="${cx}" y="${cy+13}" text-anchor="middle" fill="${col}" font-size="9" font-weight="700">${lbl}</text></svg>`;}
function buildChart(){const W=360,PL=48,PR=4,CW=W-PL-PR;const ss=Math.max(0,SD.closes.length-PERIOD);const closes=SD.closes.slice(ss),volumes=SD.volumes.slice(ss),candles=SD.candles.slice(ss);const n=closes.length,total=n+SIMDAYS;const xOf=i=>PL+(i/(total-1))*CW,cw=Math.max(2.5,CW/total*.65);const S5=sma(SD.closes,5).slice(ss),S20=sma(SD.closes,20).slice(ss),S60=sma(SD.closes,60).slice(ss);const BB=boll(SD.closes).slice(ss),RSI=rsi(SD.closes).slice(ss);const{mc:Ma,sig:Ms,hist:Mh}=macd(SD.closes);const Ma_s=Ma.slice(ss),Ms_s=Ms.slice(ss),Mh_s=Mh.slice(ss);const cx=crosses(sma(SD.closes,20),sma(SD.closes,60)).filter(c=>c.i>=ss).map(c=>({...c,i:c.i-ss}));const PH=160,VH=32,RH=50,MH=48;const vT=PH+2,rT=vT+VH+2,mT=rT+RH+2,totH=mT+MH+4;const allP=[...closes,...(MC?[...MC.ds.map(d=>d.p90),...MC.ds.map(d=>d.p10)]:[]),...BB.filter(Boolean).map(b=>b.u),...BB.filter(Boolean).map(b=>b.lo)].filter(Boolean);const pMin=Math.min(...allP)*.993,pMax=Math.max(...allP)*1.007;const py=v=>totScY(v,pMin,pMax,PH);const vMax=Math.max(...volumes),vy=v=>VH-3-(v/vMax)*(VH-5);const ry=v=>totScY(v,0,100,RH);const mAll=[...Ma_s,...Ms_s].filter(v=>!isNaN(v));const mMin=Math.min(...mAll),mMax=Math.max(...mAll);const my=v=>totScY(v,mMin,mMax,MH);const hMax=Math.max(...Mh_s.map(Math.abs))||1;const hZero=totScY(0,-hMax,hMax,MH),hy=v=>totScY(v,-hMax,hMax,MH);const volSMA=sma(volumes,5);const lrArr=lrForecast(closes,SIMDAYS);const divX=xOf(n-1);const pLabels=[0,.33,.67,1].map(r=>pMin+r*(pMax-pMin));let mcBand='',p50p='',lrp='';if(MC){const sx=xOf(n-1),sy=py(closes[n-1]);const p90s=MC.ds.map((d,i)=>`L${xOf(n+i).toFixed(1)},${py(d.p90).toFixed(1)}`).join('');const p10s=MC.ds.slice().reverse().map((d,i)=>`L${xOf(n+MC.ds.length-1-i).toFixed(1)},${py(d.p10).toFixed(1)}`).join('');mcBand=`M${sx},${sy} ${p90s} ${p10s} Z`;p50p=`M${sx},${sy} `+MC.ds.map((d,i)=>`L${xOf(n+i)},${py(d.p50)}`).join(' ');lrp=`M${sx},${sy} `+lrArr.map((v,i)=>`L${xOf(n+i)},${py(v)}`).join(' ');}let bollBand='',bollUp='',bollLo='',bollMid='';if(SHOW.boll){const up=BB.map((b,i)=>b?[xOf(i),py(b.u)]:null).filter(Boolean);const lo=BB.map((b,i)=>b?[xOf(i),py(b.lo)]:null).filter(Boolean);bollUp=mkSVGPath(BB.map((b,i)=>b?[xOf(i),py(b.u)]:null));bollLo=mkSVGPath(BB.map((b,i)=>b?[xOf(i),py(b.lo)]:null));bollMid=mkSVGPath(BB.map((b,i)=>b?[xOf(i),py(b.mid)]:null));bollBand=bollUp+' '+lo.slice().reverse().map(p=>`L${p[0]},${p[1]}`).join(' ')+' Z';}let priceContent='';if(SHOW.candle){priceContent=candles.map((c,i)=>{const x=xOf(i),bull=c.c>=c.o,col=bull?'#ef5350':'#42a5f5';const bodyY=Math.min(py(c.o),py(c.c)),bodyH=Math.max(Math.abs(py(c.o)-py(c.c)),1.5);return`<line x1="${x}" y1="${py(c.h)}" x2="${x}" y2="${py(c.l)}" stroke="${col}" stroke-width=".9" opacity=".8"/><rect x="${x-cw/2}" y="${bodyY}" width="${cw}" height="${bodyH}" fill="${col}" opacity=".88"/>`;}).join('');}else{const pts=closes.map((p,i)=>[xOf(i),py(p)]);const area=`M${pts[0][0]},${PH} `+pts.map(p=>`L${p[0]},${p[1]}`).join(' ')+` L${pts[pts.length-1][0]},${PH} Z`;priceContent=`<path d="${area}" fill="url(#gArea)"/><path d="${mkSVGPath(pts)}" fill="none" stroke="#00e5ff" stroke-width="1.8" stroke-linejoin="round"/>`;}let crossContent='';if(SHOW.cross){crossContent=cx.map(cr=>{const x=xOf(cr.i),y=py(closes[cr.i]),bull=cr.type==='golden',col=bull?'#ffd740':'#ff5252';const pts=bull?`${x},${y-13} ${x-5},${y-4} ${x+5},${y-4}`:`${x},${y+13} ${x-5},${y+4} ${x+5},${y+4}`;return`<polygon points="${pts}" fill="${col}" opacity=".95"/><text x="${x}" y="${bull?y-16:y+21}" text-anchor="middle" fill="${col}" font-size="7" font-weight="800">${bull?'G':'D'}</text>`;}).join('');}const volContent=volumes.map((v,i)=>{const bull=i===0||closes[i]>=closes[i-1];return`<rect x="${xOf(i)-cw/2}" y="${vy(v)}" width="${cw}" height="${Math.max(VH-3-vy(v),1)}" fill="${bull?'#ef535088':'#42a5f588'}"/>`;}).join('');const histContent=Mh_s.map((h,i)=>{if(isNaN(h))return'';const bh=Math.abs(hZero-hy(h));return`<rect x="${xOf(i)-1.3}" y="${h>=0?hy(h):hZero}" width="2.6" height="${Math.max(bh,.5)}" fill="${h>=0?'#00e67666':'#ff525266'}"/>`;}).join('');return`<svg width="100%" viewBox="0 0 ${W} ${totH}" style="display:block"><defs><linearGradient id="gArea" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00e5ff" stop-opacity=".18"/><stop offset="100%" stop-color="#00e5ff" stop-opacity=".01"/></linearGradient><linearGradient id="gMC" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffd740" stop-opacity=".2"/><stop offset="100%" stop-color="#ffd740" stop-opacity=".02"/></linearGradient><clipPath id="cP"><rect x="${PL}" y="0" width="${CW}" height="${PH}"/></clipPath><clipPath id="cV"><rect x="${PL}" y="${vT}" width="${CW}" height="${VH}"/></clipPath><clipPath id="cR"><rect x="${PL}" y="${rT}" width="${CW}" height="${RH}"/></clipPath><clipPath id="cM"><rect x="${PL}" y="${mT}" width="${CW}" height="${MH}"/></clipPath></defs><rect x="0" y="0" width="${W}" height="${PH}" fill="#050d15"/><rect x="0" y="${vT}" width="${W}" height="${VH}" fill="#040b12"/><rect x="0" y="${rT}" width="${W}" height="${RH}" fill="#050d15"/><rect x="0" y="${mT}" width="${W}" height="${MH}" fill="#040b12"/><text x="${PL+2}" y="${vT+9}" fill="#1e3a4a" font-size="7.5" font-weight="700">Volume</text><text x="${PL+2}" y="${rT+9}" fill="#1e3a4a" font-size="7.5" font-weight="700">RSI(14)</text><text x="${PL+2}" y="${mT+9}" fill="#1e3a4a" font-size="7.5" font-weight="700">MACD</text>${pLabels.map(v=>`<line x1="${PL}" y1="${py(v)}" x2="${W-PR}" y2="${py(v)}" stroke="#0a1e2d" stroke-width=".5" stroke-dasharray="3,4"/><text x="${PL-2}" y="${py(v)+3}" text-anchor="end" fill="#1a3040" font-size="7">${fmtL(v)}</text>`).join('')}<line x1="${divX}" y1="0" x2="${divX}" y2="${totH}" stroke="#ffd740" stroke-width=".8" stroke-dasharray="3,3" opacity=".45"/><text x="${divX+2}" y="9" fill="#ffd74066" font-size="7">예측▶</text><g clip-path="url(#cP)">${SHOW.boll?`<path d="${bollBand}" fill="#a78bfa" fill-opacity=".07"/><path d="${bollUp}" fill="none" stroke="#a78bfa" stroke-widt function renderStock(){document.getElementById('home-box').style.display='none';document.getElementById('stock-box').style.display='block';const change=SD.cur-SD.prev;const changePct=SD.prev?((change/SD.prev)*100).toFixed(2):'0';const sc=score(SD.closes,SD.volumes);const rsiCur=rsi(SD.closes).slice(-1)[0];const{mc,sig}=macd(SD.closes);const nn=SD.closes.length;const macdBull=mc[nn-1]>sig[nn-1];const obvArr=obv(SD.closes,SD.volumes);const obvBull=obvArr[nn-1]>obvArr[nn-7];const miniCards=[{l:'RSI',v:rsiCur?.toFixed(0),c:rsiCur>70?'#ff5252':rsiCur<30?'#00e676':'#ffd740'},{l:'MACD',v:macdBull?'매수':'매도',c:macdBull?'#00e676':'#ff5252'},{l:'OBV',v:obvBull?'매집':'분산',c:obvBull?'#00e676':'#ff5252'}];document.getElementById('stock-header').innerHTML=`<div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-size:16px;font-weight:800;color:#e0f0f8;line-height:1.2">${SD.name}</div><div style="display:flex;gap:5px;margin-top:4px;flex-wrap:wrap"><span class="badge">${SD.ticker}</span><span class="badge">${SD.market}</span><span class="badge">${SD.len}일</span></div></div><div style="text-align:right"><div style="font-size:20px;font-weight:800;color:#00e5ff;letter-spacing:-0.5px">${fmtP(SD.cur,SD.isKr)}</div><div style="font-size:12px;color:${change>=0?'#00e676':'#ff5252'};font-weight:600">${change>=0?'+':''}${fmtP(Math.abs(change),SD.isKr)} (${changePct}%)</div></div></div>${SD.h52?`<div style="display:flex;gap:10px;margin-top:8px"><span style="font-size:9px;color:#1e3a4a">52주 고 <span style="color:#00e676">${fmtP(SD.h52,SD.isKr)}</span></span><span style="font-size:9px;color:#1e3a4a">52주 저 <span style="color:#ff5252">${fmtP(SD.l52,SD.isKr)}</span></span></div>`:''}<div style="display:flex;gap:7px;margin-top:10px;align-items:center"><div style="display:flex;gap:5px">${miniCards.map(m=>`<div style="background:#0a1a27;border-radius:6px;padding:3px 7px;border:1px solid ${m.c}33"><span style="font-size:9px;color:#2a4a5e">${m.l} </span><span style="font-size:10px;font-weight:700;color:${m.c}">${m.v}</span></div>`).join('')}</div><div style="margin-left:auto">${buildGauge(sc.score)}</div></div>`;renderChartPane();renderPredictPane();renderSignalsPane(sc);switchTab('chart');}
function renderChartPane(){const periodSlice=SD.closes.slice(Math.max(0,SD.closes.length-PERIOD));const hi=Math.max(...periodSlice),lo=Math.min(...periodSlice);const chg=((periodSlice[periodSlice.length-1]/periodSlice[0]-1)*100).toFixed(1);const rsiCur=rsi(SD.closes).slice(-1)[0];const stats=[{l:'구간 최고',v:fmtP(hi,SD.isKr),c:'#00e676'},{l:'구간 최저',v:fmtP(lo,SD.isKr),c:'#ff5252'},{l:'구간 등락',v:chg+'%',c:parseFloat(chg)>=0?'#00e676':'#ff5252'},{l:'RSI',v:rsiCur?.toFixed(1),c:rsiCur>70?'#ff5252':rsiCur<30?'#00e676':'#ffd740'}];const indBtns=[{k:'candle',l:'🕯️캔들',c:'#ef5350'},{k:'boll',l:'볼밴',c:'#a78bfa'},{k:'sma5',l:'SMA5',c:'#ffd740'},{k:'sma20',l:'SMA20',c:'#ff6b35'},{k:'sma60',l:'SMA60',c:'#00e676'},{k:'cross',l:'▲▼크로스',c:'#ffd740'}];document.getElementById('pane-chart').innerHTML=`<div class="card"><div style="font-size:9.5px;color:#1e3a4a;margin-bottom:7px">📅 기간</div><div style="display:flex;gap:5px">${[7,14,30,60,100].map((d,i)=>`<button class="period-btn${PERIOD===d?' active':''}" style="flex:1;padding:8px 2px" onclick="setPeriod(${d})">${['7일','14일','30일','60일','전체'][i]}</button>`).join('')}</div></div><div class="card"><div style="font-size:9.5px;color:#1e3a4a;margin-bottom:7px">🔧 지표</div><div style="display:flex;flex-wrap:wrap;gap:5px">${indBtns.map(b=>`<button class="ind-btn${SHOW[b.k]?' active':''}" style="padding:6px 9px;${SHOW[b.k]?`border-color:${b.c};background:${b.c}18;color:${b.c}`:''}" onclick="toggleInd('${b.k}','${b.c}')">${b.l}</button>`).join('')}</div></div><div class="card" style="display:flex;align-items:center;gap:7px"><span style="font-size:10px;color:#1e3a4a">🔮 예측</span>${[3,5,7,10].map(d=>`<button class="pred-btn${SIMDAYS===d?' active':''}" style="flex:1;padding:7px 0" onclick="setSimDays(${d})">${d}일</button>`).join('')}</div><div style="background:#050d15;border-radius:12px;border:1px solid #0d2535;overflow:hidden">${buildChart()}</div><div class="card" style="margin-top:10px"><div style="font-size:10px;color:#1e3a4a;margin-bottom:8px">📊 ${PERIOD===100?'전체':PERIOD+'일'} 통계</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">${stats.map(s=>`<div class="stat-card" style="border:1px solid ${s.c}22"><div style="font-size:9px;color:#1e3a4a;margin-bottom:2px">${s.l}</div><div style="font-size:13px;font-weight:700;color:${s.c}">${s.v}</div></div>`).join('')}</div></div>`;}
function renderPredictPane(){if(!MC)return;const rows=MC.ds.map(d=>{const bull=d.p50>SD.cur;const barW=Math.min(Math.abs((d.p50/SD.cur-1)*100)*15,100);return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;color:#1e3a4a">D+${d.day}</span><span style="font-size:11px;color:${bull?'#00e676':'#ff5252'};font-weight:600">${fmtP(Math.round(d.p50),SD.isKr)} (${((d.p50/SD.cur-1)*100).toFixed(2)}%)</span></div><div style="background:#060d14;border-radius:4px;height:6px"><div style="height:100%;border-radius:4px;background:${bull?'#00e676':'#ff5252'};width:${barW}%;transition:width .5s"></div></div><div style="display:flex;justify-content:space-between;margin-top:2px"><span style="font-size:8px;color:#152030">▼${fmtP(Math.round(d.p10),SD.isKr)}</span><span style="font-size:8px;color:#152030">▲${fmtP(Math.round(d.p90),SD.isKr)}</span></div></div>`;}).join('');document.getElementById('pane-predict').innerHTML=`<div class="card"><div style="font-size:11px;color:#1e3a4a;margin-bottom:4px">${SIMDAYS}일 후 가격 분포 (Monte Carlo)</div><div style="font-size:9px;color:#1e3a4a;margin-bottom:12px">σ=${(MC.sigma*100).toFixed(2)}% · μ=${(MC.mu*100).toFixed(3)}%</div><div style="display:flex;gap:7px;margin-bottom:13px">${[{l:'낙관 P90',v:MC.p90,c:'#00e676'},{l:'중앙 P50',v:MC.p50,c:'#ffd740'},{l:'비관 P10',v:MC.p10,c:'#ff5252'}].map(item=>`<div style="flex:1;background:#060d14;border-radius:8px;padding:10px 5px;text-align:center;border:1px solid ${item.c}22"><div style="color:${item.c};font-size:11px;font-weight:700">${fmtP(Math.round(item.v),SD.isKr)}</div><div style="color:${item.c};font-size:9px;opacity:.65">(${((item.v/SD.cur-1)*100).toFixed(1)}%)</div><div style="color:#1e3a4a;font-size:8px;margin-top:2px">${item.l}</div></div>`).join('')}</div>${rows}</div>`;}
function renderSignalsPane(sc){document.getElementById('pane-signals').innerHTML=`<div class="card" style="text-align:center;margin-bottom:12px"><div style="font-size:11px;color:#1e3a4a;margin-bottom:6px">종합 신호 스코어</div>${buildGauge(sc.score)}</div><div class="card"><div style="font-size:11px;color:#1e3a4a;margin-bottom:8px">신호 분해</div>${sc.signals.map(s=>`<div class="sig-row"><div style="display:flex;align-items:center;gap:8px"><div style="width:6px;height:6px;border-radius:50%;background:${s.b?'#00e676':'#ff5252'};box-shadow:0 0 5px ${s.b?'#00e676':'#ff5252'}"></div><span style="font-size:11px;color:#cfe8f0">${s.n}</span></div><span style="font-size:11px;font-weight:700;color:${s.b?'#00e676':'#ff5252'}">${s.v}pt</span></div>`).join('')}</div>`;}
function switchTab(t){['chart','predict','signals'].forEach(id=>{document.getElementById('pane-'+id).style.display=id===t?'block':'none';document.getElementById('tab-'+id).className='tab-btn'+(id===t?' active':'');});}
function setPeriod(d){PERIOD=d;renderChartPane();}
function setSimDays(d){SIMDAYS=d;MC=monteCarlo(SD.closes,d);renderChartPane();renderPredictPane();}
function toggleInd(k,col){SHOW[k]=!SHOW[k];renderChartPane();}
</script>
</body>
</html>
